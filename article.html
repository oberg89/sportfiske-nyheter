<!DOCTYPE html>
<html lang="sv">
<head>
    <!-- Den här sidan visar en enskild artikel i sin helhet -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Sportfiske Nyheter</title>
    <!-- Bootstrap 5 CSS för layout och design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ikoner för gilla-knappar och annat -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Min egna stilmall -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Menyn - Samma som på startsidan för att hålla stilen konsekvent -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand logo-text" href="index.html">
                SPORTFISKE<span>NYHETER</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Nyheter</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="abborre.html">Abborre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gadda.html">Gädda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tavling.html">Tävling</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Innehållet för artikeln -->
    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <!-- Själva artikeln med bild, titel och text -->
                <article class="card mb-4">
                    <img id="article-image" src="" alt="" class="card-img-top" style="display: none;">
                    <div class="card-body">
                        <h1 id="article-title" class="card-title h2 mb-3"></h1>
                        <div id="article-content" class="card-text article-content"></div>
                        <small id="article-date" class="text-muted"></small>
                    </div>
                </article>

                <!-- Sektion för Likes och Dislikes - Sparas i localStorage -->
                <div class="d-flex align-items-center mb-4">
                    <button class="btn btn-outline-success me-2" onclick="handleLike(window.currentArticleId)">
                        <i class="bi bi-hand-thumbs-up"></i> Gilla (<span id="likes-count">0</span>)
                    </button>
                    <button class="btn btn-outline-danger" onclick="handleDislike(window.currentArticleId)">
                        <i class="bi bi-hand-thumbs-down"></i> Ogilla (<span id="dislikes-count">0</span>)
                    </button>
                </div>

                <!-- Kommentarsfältet - Här kan besökare skriva vad de tycker -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="h5 mb-0">Kommentarer</h3>
                    </div>
                    <div class="card-body">
                        <div id="comments-container" class="mb-3">
                            <!-- Här fyller JavaScript på med de kommentarer som finns sparade -->
                        </div>
                        <!-- Formulär för att skicka en ny kommentar -->
                        <form id="comment-form">
                            <div class="mb-3">
                                <label for="comment-text" class="form-label">Lägg till kommentar</label>
                                <textarea class="form-control" id="comment-text" rows="3" required placeholder="Skriv din kommentar här..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Skicka kommentar</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Sidomeny med snabblänkar till andra nyheter -->
            <aside class="col-lg-4">
                <div class="p-4 bg-white rounded">
                    <h3 class="h4 mb-3 border-bottom pb-2">Senaste</h3>
                    <div class="list-group list-group-flush">
                        <a href="abborre.html" class="list-group-item list-group-item-action border-0 px-0">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1">Tävlingstips för Abborre</h6>
                            </div>
                            <small class="text-muted">Publicerad idag</small>
                        </a>
                        <a href="gadda.html" class="list-group-item list-group-item-action border-0 px-0">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1">Gäddfiske i insjöar</h6>
                            </div>
                            <small class="text-muted">Publicerad igår</small>
                        </a>
                        <a href="ekolod.html" class="list-group-item list-group-item-action border-0 px-0">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1">Bästa ekoloden 2026</h6>
                            </div>
                            <small class="text-muted">2 dagar sedan</small>
                        </a>
                    </div>
                </div>

                <!-- En ruta för att locka till nyhetsbrev även här -->
                <div class="mt-4 p-4 bg-dark text-white rounded shadow-sm">
                    <h4 class="h5">Bli Medlem!</h4>
                    <p class="small">Få exklusiva fisketips och nyheter direkt i din inbox.</p>
                    <button class="btn btn-outline-light btn-sm w-100" onclick="showToast('Tack för din anmälan!')">Anmäl nyhetsbrev</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- Behållare för toast-notifikationer -->
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Footer som är likadan på alla sidor -->
    <footer class="bg-dark text-white py-5 text-center mt-5">
        <div class="container">
            <div class="mb-3">
                <a href="#" class="text-white me-3 text-decoration-none"><i class="bi bi-instagram fs-4"></i></a>
                <a href="#" class="text-white me-3 text-decoration-none"><i class="bi bi-youtube fs-4"></i></a>
                <a href="#" class="text-white text-decoration-none"><i class="bi bi-facebook fs-4"></i></a>
            </div>
            <p class="mb-0">&copy; 2026 Sportfiske.se</p>
        </div>
    </footer>

    <!-- Bootstrap script för interaktivitet -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Min JavaScript som sköter hämtning av artikeldata och kommentarer -->
    <script src="script.js"></script>
</body>
</html>
